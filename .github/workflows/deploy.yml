name: 🚀 Build & Deploy via Docker Registry

on:
  push:
    branches:
      - main
      - staging
      - uji-coba-merge
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Images to Docker Registry
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7.0.0

      - name: 🛠️ Set Environment Variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
          # Gunakan secret DOCKER_USERNAME atau default ke github owner lowercase
          echo "REGISTRY_USER=${{ secrets.DOCKER_USERNAME || github.repository_owner }}" >> $GITHUB_ENV

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_USER }}/pharmacy-backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📦 Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_USER }}/pharmacy-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to VM via SSH (Pull & Run)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Set Environment Variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_ENV
            echo "APP_DIR=~/pharmacy-app" >> $GITHUB_ENV
            echo "RESET_BRANCH=main" >> $GITHUB_ENV
            echo "HEALTH_PORT=5000" >> $GITHUB_ENV
            echo "COMPOSE_FILES=-f docker-compose.yml" >> $GITHUB_ENV
            echo "DB_HOST_PORT=5432" >> $GITHUB_ENV
            echo "REDIS_HOST_PORT=6379" >> $GITHUB_ENV
            echo "BACKEND_HOST_PORT=5000" >> $GITHUB_ENV
            echo "FRONTEND_HOST_PORT=80" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          else
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "APP_DIR=~/pharmacy-app-staging" >> $GITHUB_ENV
            echo "RESET_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "HEALTH_PORT=5001" >> $GITHUB_ENV
            echo "COMPOSE_FILES=-f docker-compose.yml -f docker-compose.staging.yml" >> $GITHUB_ENV
            echo "DB_HOST_PORT=5433" >> $GITHUB_ENV
            echo "REDIS_HOST_PORT=6380" >> $GITHUB_ENV
            echo "BACKEND_HOST_PORT=5001" >> $GITHUB_ENV
            echo "FRONTEND_HOST_PORT=8080" >> $GITHUB_ENV
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
          echo "DOCKER_REGISTRY_USER=${{ secrets.DOCKER_USERNAME || github.repository_owner }}" >> $GITHUB_ENV

      - name: 🚀 Pull & Run on VM via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set -e

            echo "📁 Menyiapkan direktori aplikasi (${{ env.ENV_NAME }})..."
            mkdir -p ${{ env.APP_DIR }}
            cd ${{ env.APP_DIR }}

            # Clone jika belum ada, pull jika sudah ada
            if [ ! -d ".git" ]; then
              echo "📦 Clone repository..."
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "🔄 Pull perubahan terbaru..."
              git fetch origin
              git reset --hard origin/${{ env.RESET_BRANCH }}
            fi

            # Buat .env dari GitHub Secrets
            echo "⚙️  Membuat file .env..."
            if [ "${{ env.ENV_NAME }}" = "production" ]; then
              TUNNEL_TOKEN="${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}"
            else
              TUNNEL_TOKEN="${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_STAGING }}"
            fi

            cat > .env << EOF
            DB_HOST=db
            DB_PORT=5432
            DB_HOST_PORT=${{ env.DB_HOST_PORT }}
            REDIS_HOST_PORT=${{ env.REDIS_HOST_PORT }}
            BACKEND_HOST_PORT=${{ env.BACKEND_HOST_PORT }}
            FRONTEND_HOST_PORT=${{ env.FRONTEND_HOST_PORT }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            DOCKER_REGISTRY_USER=${{ env.DOCKER_REGISTRY_USER }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            NODE_ENV=${{ env.ENV_NAME }}
            PORT=5000
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            CLOUDFLARE_TUNNEL_TOKEN=$TUNNEL_TOKEN
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REDIS_URL=redis://redis:6379
            EOF

            # Login ke registry di VM agar bisa pull
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin 2>/dev/null || true

            echo "🐳 Menarik image terbaru dari Docker Hub..."
            docker compose ${{ env.COMPOSE_FILES }} pull

            echo "🐳 Membangun ulang dan menjalankan container..."
            docker compose ${{ env.COMPOSE_FILES }} down --remove-orphans
            docker compose ${{ env.COMPOSE_FILES }} up -d

            echo "⏳ Menunggu container sehat..."
            sleep 15

            echo "✅ Status container:"
            docker compose ${{ env.COMPOSE_FILES }} ps

            echo "🌱 Menjalankan database seeder..."
            docker compose ${{ env.COMPOSE_FILES }} exec -T backend npm run seed || true

            echo "🎉 Deployment selesai!"

      # 3. Verifikasi health check aplikasi
      - name: 🔍 Health Check
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            echo "🏥 Menjalankan health check..."
            sleep 5
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ env.HEALTH_PORT }}/health || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Health check LULUS — Aplikasi berjalan normal (HTTP $RESPONSE)"
            else
              echo "⚠️  Health check mendapat respons: HTTP $RESPONSE"
              echo "Memeriksa log backend..."
              cd ${{ env.APP_DIR }}
              docker compose ${{ env.COMPOSE_FILES }} logs --tail=30 backend
              exit 1
            fi
