services:
  db:
    image: postgres:latest
    container_name: pharmacy_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pharmacy_db}
      POSTGRES_USER: ${DB_USER:-pharmacy_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pharmacy_user} -d ${DB_NAME:-pharmacy_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmacy_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-pharmacy_db}
      DB_USER: ${DB_USER:-pharmacy_user}
      DB_PASSWORD: ${DB_PASSWORD:-securepassword123}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharmacy_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: pharmacy_network
