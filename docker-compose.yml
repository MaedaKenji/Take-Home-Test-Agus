services:
  db:
    image: postgres:14.23-alpine3.24
    container_name: pharmacy_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pharmacy_db}
      POSTGRES_USER: ${DB_USER:-pharmacy_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-pharmacy_user} -d ${DB_NAME:-pharmacy_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8.0
    container_name: pharmacy_redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY_USER:-maedakenji}/pharmacy-backend:${IMAGE_TAG:-latest}
    container_name: pharmacy_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-pharmacy_db}
      DB_USER: ${DB_USER:-pharmacy_user}
      DB_PASSWORD: ${DB_PASSWORD:-securepassword123}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-changeme_super_secret}
      REDIS_URL: redis://redis:6379
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY_USER:-maedakenji}/pharmacy-frontend:${IMAGE_TAG:-latest}
    container_name: pharmacy_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:1885-86fccede6d14
    container_name: pharmacy_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  postgres_data:

networks:
  default:
    name: pharmacy_network
